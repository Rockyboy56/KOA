<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KOA — Knight Attack Animation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; padding: 40px; font-family: Georgia, serif; color: #fff; }
h1 { color: #ffd700; margin-bottom: 8px; font-size: 22px; }
p { color: #aaa; margin-bottom: 24px; font-size: 13px; }
.row { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
.card { background: #2a2a3e; border: 1px solid #444; border-radius: 12px; padding: 20px; text-align: center; }
.card canvas { display: block; margin: 0 auto 10px; }
.card label { color: #ccc; font-size: 13px; }
.card p { color: #888; font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>
<h1>Knight — Attack Animations (Top-Down)</h1>
<p>Click any canvas to trigger the attack. Animations loop automatically.</p>
<div class="row">
  <div class="card">
    <canvas id="c1" width="200" height="200"></canvas>
    <label>Combo 1 — Wide Arc Sweep</label>
    <p>120° blue slash arc, sword swings right-to-left</p>
  </div>
  <div class="card">
    <canvas id="c2" width="200" height="200"></canvas>
    <label>Combo 2 — Reverse Sweep</label>
    <p>Backhand swing, orange tint (+10% dmg)</p>
  </div>
  <div class="card">
    <canvas id="c3" width="200" height="200"></canvas>
    <label>Combo 3 — Overhead Slam</label>
    <p>Wide 160° arc, red/gold tint (+25% dmg)</p>
  </div>
</div>

<script>
// ── Draw the knight body (top-down, no sword — sword drawn separately per anim)
function drawKnightBody(ctx, swordAngle) {
  ctx.save();

  // Cape
  ctx.fillStyle = '#881111';
  ctx.strokeStyle = '#550000'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-6, 4);
  ctx.bezierCurveTo(-14, 16, 0, 22, 6, 16);
  ctx.bezierCurveTo(14, 8, 8, 4, 6, 4);
  ctx.fill(); ctx.stroke();

  // Body
  const bodyGrad = ctx.createRadialGradient(-2,-2,2,-2,-2,18);
  bodyGrad.addColorStop(0,'#c8d8e8'); bodyGrad.addColorStop(0.6,'#8090a8'); bodyGrad.addColorStop(1,'#4a5a6a');
  ctx.fillStyle = bodyGrad; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.ellipse(0,0,16,13,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Helmet
  const helmGrad = ctx.createRadialGradient(-3,-3,1,0,0,12);
  helmGrad.addColorStop(0,'#ddeeff'); helmGrad.addColorStop(0.5,'#9aabbd'); helmGrad.addColorStop(1,'#5a6a7a');
  ctx.fillStyle=helmGrad; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,-1,11,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Plume
  ctx.fillStyle='#cc2222'; ctx.strokeStyle='#881111'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-3,-10); ctx.bezierCurveTo(-6,-20,6,-24,4,-12); ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Shield arm (left)
  ctx.fillStyle='#8090a8'; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(-20,2,5,3,-0.3,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Shield face
  ctx.fillStyle='#1a3a9a'; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(-28,-7); ctx.lineTo(-34,-7); ctx.lineTo(-36,2);
  ctx.lineTo(-34,11); ctx.lineTo(-28,13); ctx.lineTo(-26,2); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='#ffd700';
  ctx.fillRect(-33,0,8,2); ctx.fillRect(-30,-3,2,8);

  // Sword arm (right) — rotated to swordAngle
  ctx.save();
  ctx.rotate(swordAngle);
  // Arm
  ctx.fillStyle='#8090a8'; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(20,2,5,3,0.3,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Sword
  const sGrad = ctx.createLinearGradient(16,-30,22,10);
  sGrad.addColorStop(0,'#e8eef8'); sGrad.addColorStop(1,'#7080a0');
  ctx.fillStyle=sGrad; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(16,8); ctx.lineTo(18,-34); ctx.lineTo(22,-34); ctx.lineTo(24,8); ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Guard
  ctx.fillStyle='#c8a830'; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1.5;
  ctx.fillRect(13,4,13,5); ctx.strokeRect(13,4,13,5);
  ctx.restore();

  ctx.restore();
}

// ── Arc slash effect
function drawSlashArc(ctx, startAngle, endAngle, progress, color1, color2, radius) {
  if (progress <= 0) return;
  const r = radius || 55;
  const alpha = Math.sin(progress * Math.PI) * 0.7;

  // Main arc fill
  ctx.save();
  const arcGrad = ctx.createRadialGradient(0,0,r*0.3,0,0,r);
  arcGrad.addColorStop(0, color1.replace('X', (alpha*0.6).toFixed(2)));
  arcGrad.addColorStop(1, color2.replace('X', '0'));
  ctx.fillStyle = arcGrad;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.arc(0,0,r,startAngle,endAngle);
  ctx.closePath();
  ctx.fill();

  // Bright leading edge
  const edgeAlpha = Math.sin(progress * Math.PI) * 0.9;
  ctx.strokeStyle = color1.replace('X', edgeAlpha.toFixed(2));
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0,0,r,endAngle-0.05,endAngle);
  ctx.stroke();

  // Afterimage lines
  for(let i=1;i<=3;i++) {
    const ta = endAngle - (i * 0.18);
    const la = Math.max(startAngle, ta - 0.12);
    const ia = (edgeAlpha * (1 - i*0.28));
    if(ia <= 0) continue;
    ctx.strokeStyle = color1.replace('X', ia.toFixed(2));
    ctx.lineWidth = 2 - i*0.4;
    ctx.beginPath();
    ctx.arc(0,0,r - i*4, la, ta);
    ctx.stroke();
  }

  // Impact sparks at leading edge tip
  if(progress > 0.3 && progress < 0.85) {
    const sparkX = Math.cos(endAngle) * r;
    const sparkY = Math.sin(endAngle) * r;
    for(let s=0;s<5;s++) {
      const sa = endAngle + (Math.random()-0.5)*0.8;
      const sd = r + Math.random()*14;
      ctx.strokeStyle = color1.replace('X','0.9');
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(sparkX, sparkY);
      ctx.lineTo(Math.cos(sa)*sd, Math.sin(sa)*sd);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ── Sweep trail (motion blur on sword)
function drawSweepTrail(ctx, fromAngle, toAngle, progress, color) {
  const steps = 8;
  for(let i=0;i<steps;i++) {
    const t = i/steps;
    const a = fromAngle + (toAngle - fromAngle) * t;
    const alpha = (1-t) * 0.15 * Math.sin(progress*Math.PI);
    ctx.save();
    ctx.rotate(a);
    ctx.strokeStyle = color.replace('X', alpha.toFixed(2));
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(16,8); ctx.lineTo(20,-34); ctx.stroke();
    ctx.restore();
  }
}

// ══════════════════════════════════════════════════════
// CANVAS 1 — Combo 1: Wide arc sweep (right → left, 120°)
// ══════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('c1');
  const ctx = canvas.getContext('2d');
  ctx.translate(100, 115);

  let t = 0;
  const WIND = 0.25, ACTIVE = 0.4, RECOVER = 0.35;

  function frame() {
    ctx.clearRect(-100,-115,200,200);

    // Sandy ground
    ctx.fillStyle='#b89660';
    ctx.fillRect(-100,-115,200,200);
    ctx.strokeStyle='rgba(80,50,20,0.15)'; ctx.lineWidth=1;
    for(let x=-100;x<100;x+=16){ctx.beginPath();ctx.moveTo(x,-115);ctx.lineTo(x,85);ctx.stroke();}
    for(let y=-115;y<85;y+=16){ctx.beginPath();ctx.moveTo(-100,y);ctx.lineTo(100,y);ctx.stroke();}

    t = (t + 1/60) % (WIND+ACTIVE+RECOVER+0.3);

    let swordAngle = 0;
    let arcProgress = 0;

    if(t < WIND) {
      // Wind-up: rotate sword to start position
      const p = t/WIND;
      swordAngle = p * (Math.PI*0.5);
    } else if(t < WIND+ACTIVE) {
      // Active: sweep from right to left
      const p = (t-WIND)/ACTIVE;
      swordAngle = Math.PI*0.5 - p * Math.PI*(2/3);
      arcProgress = p;
      // Draw arc + trail
      const startA = -Math.PI/2 + Math.PI*0.5 - p*Math.PI*(2/3);
      const sweepSoFar = p * (2*Math.PI/3);
      drawSweepTrail(ctx, Math.PI*0.5, swordAngle, p, 'rgba(80,150,255,X)');
      drawSlashArc(ctx, -Math.PI/2, -Math.PI/2 + Math.PI*0.5 - swordAngle, p, 'rgba(80,150,255,X)', 'rgba(80,150,255,X)', 55);
    } else if(t < WIND+ACTIVE+RECOVER) {
      swordAngle = Math.PI*0.5 - Math.PI*(2/3);
    }

    drawKnightBody(ctx, swordAngle);

    // Show phase label
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(-95,55,190,22);
    ctx.fillStyle='#fff'; ctx.font='11px Georgia'; ctx.textAlign='center';
    const phase = t < WIND ? '⚡ Wind-up' : t < WIND+ACTIVE ? '⚔ ACTIVE' : '↩ Recovery';
    ctx.fillText(phase, 0, 70);

    requestAnimationFrame(frame);
  }
  frame();
})();

// ══════════════════════════════════════════════════════
// CANVAS 2 — Combo 2: Reverse sweep (left → right, orange)
// ══════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('c2');
  const ctx = canvas.getContext('2d');
  ctx.translate(100, 115);

  let t = 0;
  const WIND=0.2, ACTIVE=0.35, RECOVER=0.3;

  function frame() {
    ctx.clearRect(-100,-115,200,200);
    ctx.fillStyle='#b89660'; ctx.fillRect(-100,-115,200,200);
    ctx.strokeStyle='rgba(80,50,20,0.15)'; ctx.lineWidth=1;
    for(let x=-100;x<100;x+=16){ctx.beginPath();ctx.moveTo(x,-115);ctx.lineTo(x,85);ctx.stroke();}
    for(let y=-115;y<85;y+=16){ctx.beginPath();ctx.moveTo(-100,y);ctx.lineTo(100,y);ctx.stroke();}

    t = (t + 1/60) % (WIND+ACTIVE+RECOVER+0.3);

    let swordAngle = 0;

    if(t < WIND) {
      const p = t/WIND;
      swordAngle = -(Math.PI*0.5) * p;
    } else if(t < WIND+ACTIVE) {
      const p = (t-WIND)/ACTIVE;
      swordAngle = -Math.PI*0.5 + p * Math.PI*(2/3);
      drawSweepTrail(ctx, -Math.PI*0.5, swordAngle, p, 'rgba(255,160,30,X)');
      drawSlashArc(ctx, -Math.PI/2 - Math.PI*0.5, -Math.PI/2 + (-Math.PI*0.5 + p*Math.PI*(2/3)), p, 'rgba(255,160,30,X)', 'rgba(255,160,30,X)', 55);
    } else if(t < WIND+ACTIVE+RECOVER) {
      swordAngle = -Math.PI*0.5 + Math.PI*(2/3);
    }

    drawKnightBody(ctx, swordAngle);

    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-95,55,190,22);
    ctx.fillStyle='#fff'; ctx.font='11px Georgia'; ctx.textAlign='center';
    const phase = t < WIND ? '⚡ Wind-up' : t < WIND+ACTIVE ? '⚔ ACTIVE' : '↩ Recovery';
    ctx.fillText(phase, 0, 70);
    requestAnimationFrame(frame);
  }
  frame();
})();

// ══════════════════════════════════════════════════════
// CANVAS 3 — Combo 3: Overhead slam (full 160° wide arc, red/gold)
// ══════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('c3');
  const ctx = canvas.getContext('2d');
  ctx.translate(100, 115);

  let t = 0;
  const WIND=0.35, ACTIVE=0.5, RECOVER=0.4;

  function frame() {
    ctx.clearRect(-100,-115,200,200);
    ctx.fillStyle='#b89660'; ctx.fillRect(-100,-115,200,200);
    ctx.strokeStyle='rgba(80,50,20,0.15)'; ctx.lineWidth=1;
    for(let x=-100;x<100;x+=16){ctx.beginPath();ctx.moveTo(x,-115);ctx.lineTo(x,85);ctx.stroke();}
    for(let y=-115;y<85;y+=16){ctx.beginPath();ctx.moveTo(-100,y);ctx.lineTo(100,y);ctx.stroke();}

    t = (t + 1/60) % (WIND+ACTIVE+RECOVER+0.5);

    let swordAngle = 0;

    if(t < WIND) {
      const p = t/WIND;
      swordAngle = Math.PI*0.75 * p;
      // Brief white screen flash at end of windup
      if(p > 0.8) {
        ctx.fillStyle=`rgba(255,255,200,${(p-0.8)*0.4})`;
        ctx.fillRect(-100,-115,200,200);
      }
    } else if(t < WIND+ACTIVE) {
      const p = (t-WIND)/ACTIVE;
      swordAngle = Math.PI*0.75 - p * Math.PI*(8/6);
      // Gold then red arc
      const arcColor = p < 0.5 ? 'rgba(255,200,30,X)' : 'rgba(255,60,30,X)';
      drawSweepTrail(ctx, Math.PI*0.75, swordAngle, p, arcColor);
      drawSlashArc(ctx, -Math.PI/2 + Math.PI*0.75, -Math.PI/2 + swordAngle, p, arcColor, arcColor, 65);
      // Screen shake simulation (offset canvas slightly)
      if(p > 0.6) {
        const shake = Math.sin(p*40)*(1-p)*3;
        ctx.save(); ctx.translate(shake, shake*0.5);
        drawKnightBody(ctx, swordAngle);
        ctx.restore();
        requestAnimationFrame(frame);
        return;
      }
    } else {
      swordAngle = Math.PI*0.75 - Math.PI*(8/6);
    }

    drawKnightBody(ctx, swordAngle);

    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-95,55,190,22);
    ctx.fillStyle='#fff'; ctx.font='11px Georgia'; ctx.textAlign='center';
    const phase = t < WIND ? '⚡ Wind-up' : t < WIND+ACTIVE ? '💥 SLAM' : '↩ Recovery';
    ctx.fillText(phase, 0, 70);
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
