<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KOA Sprite Style Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; padding: 30px; font-family: Georgia, serif; color: #fff; }
h1 { color: #ffd700; margin-bottom: 8px; font-size: 24px; }
p { color: #aaa; margin-bottom: 24px; font-size: 13px; }
.grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
.card { background: #2a2a3e; border: 1px solid #444; border-radius: 10px; padding: 16px; text-align: center; }
.card canvas { display: block; margin: 0 auto 8px; }
.card label { color: #ccc; font-size: 12px; }
</style>
</head>
<body>
<h1>KOA — Sprite Style Preview</h1>
<p>Flash-era cartoon style: smooth gradients, bold outlines, expressive characters</p>
<div class="grid" id="grid"></div>

<script>
function makeCard(label, drawFn, w, h) {
  const card = document.createElement('div');
  card.className = 'card';
  const canvas = document.createElement('canvas');
  canvas.width = w || 100;
  canvas.height = h || 100;
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width/2, canvas.height/2);
  drawFn(ctx);
  const lbl = document.createElement('label');
  lbl.textContent = label;
  card.appendChild(canvas);
  card.appendChild(lbl);
  document.getElementById('grid').appendChild(card);
}

// ── PLAYER (Knight) ──────────────────────────────────────────
function drawKnight(ctx) {
  ctx.save();

  // Cape (behind)
  ctx.fillStyle = '#881111';
  ctx.beginPath();
  ctx.ellipse(-3, 4, 10, 14, 0.2, 0, Math.PI*2);
  ctx.fill();

  // Body armor
  const bodyGrad = ctx.createRadialGradient(-3, -2, 2, -3, -2, 16);
  bodyGrad.addColorStop(0, '#d8e4f0');
  bodyGrad.addColorStop(1, '#8090a8');
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 12, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // Helmet
  const helmGrad = ctx.createRadialGradient(-2, -10, 1, -2, -10, 11);
  helmGrad.addColorStop(0, '#b0bcc8');
  helmGrad.addColorStop(1, '#6878a0');
  ctx.fillStyle = helmGrad;
  ctx.beginPath();
  ctx.ellipse(0, -9, 11, 9, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // Visor slit
  ctx.fillStyle = '#222';
  ctx.fillRect(-7, -11, 14, 3);
  ctx.fillRect(-7, -7, 14, 2);

  // Red plume
  ctx.fillStyle = '#cc2222';
  ctx.strokeStyle = '#881111';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-2, -17);
  ctx.bezierCurveTo(-8, -28, 4, -32, 2, -22);
  ctx.bezierCurveTo(6, -30, 10, -26, 4, -18);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Sword (pointing right)
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
  const swordGrad = ctx.createLinearGradient(12, -2, 40, 2);
  swordGrad.addColorStop(0, '#e8eef8');
  swordGrad.addColorStop(1, '#9090a8');
  ctx.fillStyle = swordGrad;
  ctx.beginPath();
  ctx.moveTo(12, -3); ctx.lineTo(40, -1); ctx.lineTo(40, 1); ctx.lineTo(12, 3);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Guard
  ctx.fillStyle = '#c8a830';
  ctx.fillRect(10, -5, 5, 10);
  ctx.strokeRect(10, -5, 5, 10);

  // Shield (left side)
  ctx.fillStyle = '#1a3a9a';
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-14, -10);
  ctx.quadraticCurveTo(-22, -4, -22, 4);
  ctx.quadraticCurveTo(-22, 12, -14, 16);
  ctx.quadraticCurveTo(-10, 10, -10, 4);
  ctx.quadraticCurveTo(-10, -4, -14, -10);
  ctx.fill(); ctx.stroke();
  // Shield emblem
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(-18, -2, 8, 2);
  ctx.fillRect(-15, -5, 2, 8);

  ctx.restore();
}

// ── ORC RAIDER ───────────────────────────────────────────────
function drawOrcRaider(ctx) {
  ctx.save();

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(2, 14, 12, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  const bodyGrad = ctx.createRadialGradient(-3, -3, 2, -3, -3, 16);
  bodyGrad.addColorStop(0, '#66ee66');
  bodyGrad.addColorStop(1, '#228822');
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(0, 0, 13, 13, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // Angry brows
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-8,-5); ctx.lineTo(-3,-2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8,-5);  ctx.lineTo(3,-2);  ctx.stroke();

  // Eyes
  ctx.fillStyle = '#ff2222';
  ctx.beginPath(); ctx.arc(-5,-1,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-1,3,0,Math.PI*2);  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-5,-1,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-1,1.5,0,Math.PI*2);  ctx.fill();

  // Tusks
  ctx.fillStyle = '#fffde0';
  ctx.strokeStyle = '#aaa890'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-5,5); ctx.quadraticCurveTo(-7,10,-5,13); ctx.quadraticCurveTo(-3,10,-3,5);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(3,5); ctx.quadraticCurveTo(5,10,7,13); ctx.quadraticCurveTo(7,10,5,5);
  ctx.fill(); ctx.stroke();

  // Club (right side)
  ctx.fillStyle = '#8B4513';
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1.5;
  ctx.fillRect(12, -2, 5, 18);
  ctx.strokeRect(12, -2, 5, 18);
  ctx.fillStyle = '#5a2a08';
  ctx.fillRect(10, 12, 9, 8);
  ctx.strokeRect(10, 12, 9, 8);

  ctx.restore();
}

// ── BOSS TITAN ───────────────────────────────────────────────
function drawBoss(ctx) {
  ctx.save();

  // Glow aura
  const glowGrad = ctx.createRadialGradient(0,0,10,0,0,32);
  glowGrad.addColorStop(0,'rgba(255,50,50,0.3)');
  glowGrad.addColorStop(1,'rgba(255,50,50,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath(); ctx.arc(0,0,32,0,Math.PI*2); ctx.fill();

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(3,26,22,8,0,0,Math.PI*2); ctx.fill();

  // Body
  const bodyGrad = ctx.createRadialGradient(-4,-4,4,-4,-4,28);
  bodyGrad.addColorStop(0,'#2a8a2a');
  bodyGrad.addColorStop(1,'#0a3a0a');
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(0,0,26,24,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Crown
  ctx.fillStyle = '#ffd700';
  ctx.strokeStyle = '#aa8800'; ctx.lineWidth = 1.5;
  for(let i=-2; i<=2; i++) {
    ctx.beginPath();
    ctx.moveTo(i*9-4,-20);
    ctx.lineTo(i*9,-30);
    ctx.lineTo(i*9+4,-20);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  // Eyes (glowing red)
  const eyeGrad1 = ctx.createRadialGradient(-8,-6,0,-8,-6,6);
  eyeGrad1.addColorStop(0,'#ff4444'); eyeGrad1.addColorStop(1,'#880000');
  ctx.fillStyle = eyeGrad1;
  ctx.beginPath(); ctx.arc(-8,-6,6,0,Math.PI*2); ctx.fill();
  const eyeGrad2 = ctx.createRadialGradient(8,-6,0,8,-6,6);
  eyeGrad2.addColorStop(0,'#ff4444'); eyeGrad2.addColorStop(1,'#880000');
  ctx.fillStyle = eyeGrad2;
  ctx.beginPath(); ctx.arc(8,-6,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-8,-6,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(8,-6,2.5,0,Math.PI*2); ctx.fill();

  // Heavy brow
  ctx.strokeStyle = '#061506'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(-16,-10); ctx.lineTo(-4,-6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(16,-10);  ctx.lineTo(4,-6);  ctx.stroke();

  // Big tusks
  ctx.fillStyle = '#fffde0'; ctx.strokeStyle = '#aaa890'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-9,8); ctx.quadraticCurveTo(-14,18,-10,24); ctx.quadraticCurveTo(-5,16,-5,8);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(5,8); ctx.quadraticCurveTo(10,18,14,24); ctx.quadraticCurveTo(14,14,9,8);
  ctx.fill(); ctx.stroke();

  // Axe
  ctx.fillStyle = '#888'; ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
  ctx.fillRect(24,-4,6,28); ctx.strokeRect(24,-4,6,28);
  const axeGrad = ctx.createLinearGradient(20,-20,40,-4);
  axeGrad.addColorStop(0,'#d0d8e8'); axeGrad.addColorStop(1,'#7080a0');
  ctx.fillStyle = axeGrad;
  ctx.beginPath();
  ctx.moveTo(24,-4); ctx.bezierCurveTo(14,-18,38,-28,40,-10);
  ctx.bezierCurveTo(44,-2,36,4,24,4);
  ctx.fill(); ctx.stroke();

  ctx.restore();
}

// ── GOBLIN ───────────────────────────────────────────────────
function drawGoblin(ctx) {
  ctx.save();
  const bodyGrad = ctx.createRadialGradient(-2,-2,1,-2,-2,11);
  bodyGrad.addColorStop(0,'#aaff44'); bodyGrad.addColorStop(1,'#447722');
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Pointy ears
  ctx.fillStyle = '#88dd33';
  ctx.beginPath(); ctx.moveTo(-9,-2); ctx.lineTo(-16,-10); ctx.lineTo(-7,4); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(9,-2);  ctx.lineTo(16,-10);  ctx.lineTo(7,4);  ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.arc(-4,-1,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-1,3,0,Math.PI*2);  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-4,-1,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-1,1.5,0,Math.PI*2);  ctx.fill();

  // Dagger
  ctx.fillStyle = '#c0c8d0'; ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(20,-2); ctx.lineTo(20,2); ctx.closePath();
  ctx.fill(); ctx.stroke();

  ctx.restore();
}

// ── GOLD COIN ────────────────────────────────────────────────
function drawCoin(ctx) {
  ctx.save();
  const t = Date.now() * 0.003;
  const scaleX = Math.abs(Math.cos(t));

  ctx.scale(scaleX, 1);

  const coinGrad = ctx.createRadialGradient(-4,-4,1,-4,-4,14);
  coinGrad.addColorStop(0,'#ffee55'); coinGrad.addColorStop(0.6,'#ddaa00'); coinGrad.addColorStop(1,'#aa7700');
  ctx.fillStyle = coinGrad;
  ctx.strokeStyle = '#885500'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill(); ctx.stroke();

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(-4,-4,4,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#886600';
  ctx.font = 'bold 10px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('G', 0, 1);

  ctx.restore();
  requestAnimationFrame(() => {
    const canvas = ctx.canvas;
    ctx.clearRect(-canvas.width/2, -canvas.height/2, canvas.width, canvas.height);
    ctx.save(); drawCoin(ctx); ctx.restore();
  });
}

// ── STONE WALL ───────────────────────────────────────────────
function drawWall(ctx) {
  ctx.save();
  ctx.translate(-45, -30);

  const wallGrad = ctx.createLinearGradient(0,0,0,60);
  wallGrad.addColorStop(0,'#998877'); wallGrad.addColorStop(1,'#554433');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0,0,90,60);

  // Stone blocks
  ctx.strokeStyle = '#3a2a1a'; ctx.lineWidth = 1.5;
  const rows = [[0,20],[10,40]];
  rows.forEach(([offset, y]) => {
    for(let x = offset; x < 90; x += 22) {
      ctx.strokeRect(x, y > 0 ? y-20 : 0, 20, 18);
    }
  });
  ctx.strokeRect(0, 40, 18, 18); ctx.strokeRect(20,40,22,18);
  ctx.strokeRect(44,40,22,18); ctx.strokeRect(68,40,22,18);

  // Battlements
  ctx.fillStyle = '#998877';
  for(let x=0; x<90; x+=20) {
    const wallGrad2 = ctx.createLinearGradient(x,0,x,16);
    wallGrad2.addColorStop(0,'#aa9988'); wallGrad2.addColorStop(1,'#776655');
    ctx.fillStyle = wallGrad2;
    ctx.fillRect(x, -16, 14, 16);
    ctx.strokeStyle = '#3a2a1a'; ctx.lineWidth = 1.5;
    ctx.strokeRect(x, -16, 14, 16);
  }

  // Portcullis bars
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 3;
  for(let x=36; x<=54; x+=6) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,60); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(33,15); ctx.lineTo(57,15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(33,35); ctx.lineTo(57,35); ctx.stroke();

  ctx.restore();
}

// Build all cards
makeCard('Knight (Player)', drawKnight, 120, 120);
makeCard('Orc Raider', drawOrcRaider, 100, 100);
makeCard('Goblin', drawGoblin, 100, 80);
makeCard('Titan Boss', drawBoss, 140, 140);
makeCard('Gold Coin', drawCoin, 80, 80);
makeCard('Stone Wall', drawWall, 120, 100);
</script>
</body>
</html>
